<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACnetMSTP2MQTT | Management</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #4f46e5; --accent: #818cf8; --text: #f8fafc; --muted: #94a3b8; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        nav { background: #1e1b4b; padding: 0.75rem 1.5rem; border-bottom: 1px solid #312e81; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.025em; color: white; }
        .logo span { font-weight: 300; color: var(--muted); font-size: 0.75rem; margin-left: 0.4rem; font-style: italic; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        
        .tabs { display: flex; background: #1e1b4b; padding: 0 1.5rem; border-bottom: 1px solid #312e81; gap: 1rem; overflow-x: auto; }
        .tab-btn { padding: 1rem 0.5rem; background: none; border: none; color: var(--muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .container { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 0.75rem; border: 1px solid #334155; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { color: var(--accent); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.25rem; letter-spacing: 0.05em; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat-item { background: var(--bg); padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
        .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; margin-top: 0.25rem; }

        form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .full-w { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
        label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
        input, select { background: var(--bg); border: 1px solid #475569; padding: 0.6rem; color: white; border-radius: 0.4rem; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        /* Updated Checkbox Row */
        .checkbox-row { grid-column: span 2; display: flex; align-items: center; gap: 0.75rem; background: var(--bg); padding: 0.8rem; border-radius: 0.4rem; border: 1px solid #475569; cursor: pointer; user-select: none; }
        .checkbox-row:hover { border-color: var(--accent); }
        .checkbox-row input { width: 1.2rem; height: 1.1rem; margin: 0; cursor: pointer; }
        .checkbox-row label { margin: 0; color: var(--text); font-size: 0.85rem; cursor: pointer; flex-grow: 1; }

        button.primary { background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 0.4rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 0.5rem; }
        button.primary:hover { background: #4338ca; }

        #terminal { background: #000; color: #4ade80; font-family: monospace; font-size: 0.7rem; height: 300px; overflow-y: auto; padding: 0.75rem; border-radius: 0.4rem; line-height: 1.4; border: 1px solid #1e293b; }
        .log-line { margin-bottom: 2px; }
        .log-time { color: #52525b; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">BACnetMSTP2MQTT <span>by Z1rc0n1um</span></div>
        <div id="global-status" class="badge bg-green">Simulateur</div>
    </nav>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-dash')">Dashboard</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-wifi')">WiFi</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-bacnet')">BACnet</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-mqtt')">MQTT</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-sys')">Système</button>
    </div>

    <div class="container">
        <!-- DASHBOARD -->
        <div id="tab-dash" class="tab-content active">
            <div class="grid-stats">
                <div class="stat-item"><div class="stat-label">WiFi Signal</div><div id="stat-rssi" class="stat-value">-55 dBm</div></div>
                <div class="stat-item"><div class="stat-label">IP Address</div><div id="stat-ip" class="stat-value">192.168.1.50</div></div>
                <div class="stat-item"><div class="stat-label">MS/TP Status</div><div class="stat-value text-green-400">Active</div></div>
                <div class="stat-item"><div class="stat-label">MQTT Status</div><div id="stat-mqtt" class="stat-value text-green-400">Connected</div></div>
            </div>
            <div class="card" style="margin-top: 1.5rem;">
                <div class="card-title">Flux de Diagnostic</div>
                <div id="terminal"></div>
            </div>
        </div>

        <!-- WIFI CONFIG -->
        <div id="tab-wifi" class="tab-content">
            <div class="card">
                <div class="card-title">Paramètres Wi-Fi</div>
                <form onsubmit="return false">
                    <div class="form-group"><label>SSID</label><input type="text" value="MaBox_WiFi"></div>
                    <div class="form-group"><label>Password</label><input type="password" value="********"></div>
                    
                    <div class="checkbox-row" onclick="const c=this.querySelector('input'); c.checked=!c.checked; c.dispatchEvent(new Event('change'))">
                        <input type="checkbox" id="f_static_ip" onchange="document.getElementById('static-fields').style.display = this.checked ? 'grid' : 'none'">
                        <label>Utiliser une IP Statique</label>
                    </div>

                    <div id="static-fields" class="full-w grid" style="display:none; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group"><label>IP Locale</label><input type="text" placeholder="192.168.1.50"></div>
                        <div class="form-group"><label>Passerelle</label><input type="text" placeholder="192.168.1.1"></div>
                        <div class="form-group"><label>Masque</label><input type="text" placeholder="255.255.255.0"></div>
                    </div>
                    <button class="primary full-w">Sauvegarder WiFi</button>
                </form>
            </div>
        </div>

        <!-- BACNET CONFIG -->
        <div id="tab-bacnet" class="tab-content">
            <div class="card">
                <div class="card-title">Paramètres BACnet MS/TP</div>
                <form onsubmit="return false">
                    <div class="form-group"><label>Adresse MAC (0-127)</label><input type="text" value="1"></div>
                    <div class="form-group"><label>Max Master</label><input type="text" value="127"></div>
                    <div class="form-group"><label>ID Instance Device</label><input type="text" value="123001"></div>
                    <div class="form-group"><label>Baudrate</label><select><option>38400</option><option>76800</option></select></div>
                    <button class="primary full-w">Sauvegarder BACnet</button>
                </form>
            </div>
        </div>

        <!-- MQTT CONFIG -->
        <div id="tab-mqtt" class="tab-content">
            <div class="card">
                <div class="card-title">Paramètres Broker MQTT</div>
                <form onsubmit="return false">
                    <div class="form-group"><label>Serveur (IP)</label><input type="text" value="192.168.1.11"></div>
                    <div class="form-group"><label>Port</label><input type="text" value="1883"></div>
                    <div class="form-group"><label>Utilisateur</label><input type="text"></div>
                    <div class="form-group"><label>Mot de passe</label><input type="password"></div>
                    <div class="form-group full-w"><label>Préfixe Topic</label><input type="text" value="bacnet/node1"></div>
                    <button class="primary full-w">Sauvegarder MQTT</button>
                </form>
            </div>
        </div>

        <!-- SYSTEM CONFIG -->
        <div id="tab-sys" class="tab-content">
            <div class="card">
                <div class="card-title">Paramètres Système</div>
                <form onsubmit="return false">
                    <div class="form-group full-w">
                        <label>Niveau de Logs</label>
                        <select><option value="0">Erreur</option><option value="1">Alerte</option><option value="2" selected>Info</option><option value="3">Debug</option></select>
                    </div>
                    
                    <div class="checkbox-row" onclick="const c=this.querySelector('input'); c.checked=!c.checked">
                        <input type="checkbox" id="f_bridge_mode">
                        <label>Mode Pont TCP (Port 6638)</label>
                    </div>

                    <button class="primary full-w">Sauvegarder Système</button>
                </form>
            </div>
            <button onclick="alert('ESP32 Reboot command sent!')" style="background:var(--red); color:white; border:none; padding:0.8rem; border-radius:0.4rem; width:100%; font-weight:bold; cursor:pointer;">REBOOT APPAREIL</button>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
            document.getElementById(tabId).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        // Mock simulation
        setInterval(() => {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span> <span style="color:var(--accent)">[INF]</span> MS/TP Token passed | RSSI: -54 dBm`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
            if(term.children.length > 50) term.removeChild(term.firstChild);
        }, 3000);
    </script>
</body>
</html>
